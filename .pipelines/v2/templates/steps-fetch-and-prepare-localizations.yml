parameters:
  - name: includePseudoLoc
    type: boolean
    default: false

steps:
  - task: TouchdownBuildTask@5
    displayName: 'Download Localization Files -- PowerToys 37400'
    # TEMP: Touchdown returns HTTP 500 deterministically for sv-SE translation of
    # src/settings-ui/Settings.UI.Controls/Strings/en-us/Resources.resw. Service-side
    # bug, blocks all PRs. Allow the build to continue with partial loc until Touchdown
    # team resolves; missing translations fall back to en-US at runtime.
    continueOnError: true
    inputs:
      teamId: 37400
      FederatedIdentityTDBuildServiceConnection: $(TouchdownServiceConnection)
      authType: FederatedIdentityTDBuild
      resourceFilePath: |
       **\Resources.resx
       **\Resource.resx
       **\Resources.resw
      appendRelativeDir: true
      localizationTarget: false
      ${{ if eq(parameters.includePseudoLoc, true) }}:
        pseudoSetting: Included

  - pwsh: |-
      $VerbosePreference = "Continue"
      ./tools/build/move-and-rename-resx.ps1
      ./tools/build/move-uwp-resw.ps1
    displayName: Move Loc files into final locations
