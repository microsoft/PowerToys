name: PR Needs-Author-Feedback lifecycle

# Handles the lifecycle of the "Needs-Author-Feedback" label on pull requests:
# 1. New non-draft PRs automatically get "Needs-Triage" label.
# 2. When "Needs-Author-Feedback" is added to a PR:
#    - After 7 days of inactivity → convert PR to draft + comment.
#    - After 14 days of inactivity → close PR + comment.
# 3. When the author pushes commits or comments → remove "Needs-Author-Feedback",
#    add back "Needs-Triage".

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  schedule:
    # Run every 6 hours to check for stale PRs
    - cron: '0 */6 * * *'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Add "Needs-Triage" to newly opened non-draft PRs
  # ─────────────────────────────────────────────────────────────────────────────
  label-new-pr:
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review') &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Add Needs-Triage label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })).data.map(l => l.name);

            if (!labels.includes('Needs-Triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['Needs-Triage'],
              });
              console.log(`Added Needs-Triage to PR #${prNumber}`);
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: When author pushes commits → remove "Needs-Author-Feedback", add
  #         "Needs-Triage"
  # ─────────────────────────────────────────────────────────────────────────────
  author-responded-push:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      github.event.sender.id == github.event.pull_request.user.id
    runs-on: ubuntu-latest
    steps:
      - name: Remove Needs-Author-Feedback and add Needs-Triage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })).data.map(l => l.name);

            if (labels.includes('Needs-Author-Feedback')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'Needs-Author-Feedback',
              });
              console.log(`Removed Needs-Author-Feedback from PR #${prNumber}`);

              if (!labels.includes('Needs-Triage')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['Needs-Triage'],
                });
                console.log(`Added Needs-Triage to PR #${prNumber}`);
              }
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: When author comments on the PR → remove "Needs-Author-Feedback", add
  #         "Needs-Triage"
  # ─────────────────────────────────────────────────────────────────────────────
  author-responded-comment:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      github.event.sender.id == github.event.issue.user.id
    runs-on: ubuntu-latest
    steps:
      - name: Remove Needs-Author-Feedback and add Needs-Triage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue.number;
            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })).data.map(l => l.name);

            if (labels.includes('Needs-Author-Feedback')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'Needs-Author-Feedback',
              });
              console.log(`Removed Needs-Author-Feedback from PR #${prNumber}`);

              if (!labels.includes('Needs-Triage')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['Needs-Triage'],
                });
                console.log(`Added Needs-Triage to PR #${prNumber}`);
              }
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Scheduled check — convert to draft after 7 days, close after 14 days
  # ─────────────────────────────────────────────────────────────────────────────
  check-stale-prs:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Process stale PRs with Needs-Author-Feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const INACTIVITY_DAYS = 7;
            const MS_PER_DAY = 24 * 60 * 60 * 1000;
            const now = Date.now();

            // Find all open PRs with "Needs-Author-Feedback" label
            const prs = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'Needs-Author-Feedback',
              per_page: 100,
            });

            for (const issue of prs) {
              // Skip issues (only process PRs)
              if (!issue.pull_request) continue;

              const prNumber = issue.number;

              // Get the full PR object to check draft status
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              // Find last meaningful activity from the PR author (not bot actions).
              // Check commits and comments from the author.
              const authorLogin = pr.user.login;

              // Get last commit date
              const commits = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 1,
                page: 1,
              });
              // Get total pages to find last commit
              const linkHeader = commits.headers?.link || '';
              let lastCommitDate = new Date(pr.created_at).getTime();
              if (commits.data.length > 0) {
                // Fetch last page of commits for the most recent one
                const lastPageMatch = linkHeader.match(/page=(\d+)>; rel="last"/);
                const lastPage = lastPageMatch ? parseInt(lastPageMatch[1], 10) : 1;
                const lastCommits = await github.rest.pulls.listCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 1,
                  page: lastPage,
                });
                if (lastCommits.data.length > 0) {
                  const commitDate = lastCommits.data[lastCommits.data.length - 1].commit?.committer?.date
                    || lastCommits.data[lastCommits.data.length - 1].commit?.author?.date;
                  if (commitDate) {
                    lastCommitDate = new Date(commitDate).getTime();
                  }
                }
              }

              // Get last comment from author
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              let lastAuthorCommentDate = 0;
              for (const comment of comments) {
                if (comment.user?.login === authorLogin && !comment.user?.type?.includes('Bot')) {
                  const commentDate = new Date(comment.created_at).getTime();
                  if (commentDate > lastAuthorCommentDate) {
                    lastAuthorCommentDate = commentDate;
                  }
                }
              }

              const lastAuthorActivity = Math.max(lastCommitDate, lastAuthorCommentDate);
              const daysSinceAuthorActivity = (now - lastAuthorActivity) / MS_PER_DAY;

              console.log(`PR #${prNumber}: ${daysSinceAuthorActivity.toFixed(1)} days since last author activity, draft=${pr.draft}`);

              if (daysSinceAuthorActivity < INACTIVITY_DAYS) {
                continue;
              }

              // If already draft and still inactive → close.
              // Check if we previously posted the draft-conversion warning. If the PR was
              // submitted as a draft originally (no bot warning), we still convert-to-draft
              // step is a no-op but we post the warning first before closing on the next cycle.
              if (pr.draft) {
                const BOT_DRAFT_MARKER = 'automatically converted to a draft';
                const hasBotDraftWarning = comments.some(c =>
                  c.user?.type === 'Bot' && c.body?.includes(BOT_DRAFT_MARKER)
                );

                if (!hasBotDraftWarning) {
                  // Post the warning first; close on next scheduled run
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: [
                      'This pull request has been automatically converted to a draft because it has',
                      'been marked as requiring author feedback but has not had any activity for',
                      '**7 days**.',
                      '',
                      'If no further activity occurs within **7 more days**, this PR will be closed',
                      'automatically.',
                      '',
                      'To continue working on this PR, please push your changes or leave a comment.',
                      'The `Needs-Author-Feedback` label will be removed automatically when you do so.',
                    ].join('\n'),
                  });
                  console.log(`PR #${prNumber} was already draft; posted warning (will close on next cycle if still inactive)`);
                  continue;
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: [
                    'This pull request has been automatically closed because it has been marked as',
                    'requiring author feedback but has not had any activity for **14 days**.',
                    '',
                    'If you would like to continue working on this, please reopen the PR and push',
                    'your changes. The `Needs-Author-Feedback` label will be removed automatically',
                    'when you do so.',
                  ].join('\n'),
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  state: 'closed',
                });
                console.log(`Closed PR #${prNumber} (inactive ${daysSinceAuthorActivity.toFixed(1)} days)`);
                continue;
              }

              // Not draft yet and inactive 7+ days → convert to draft
              // GitHub REST API does not support converting to draft; use GraphQL.
              const mutation = `
                mutation($pullRequestId: ID!) {
                  convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                    pullRequest { id isDraft }
                  }
                }
              `;

              try {
                await github.graphql(mutation, { pullRequestId: pr.node_id });
                console.log(`Converted PR #${prNumber} to draft (inactive ${daysSinceAuthorActivity.toFixed(1)} days)`);
              } catch (err) {
                console.log(`Failed to convert PR #${prNumber} to draft: ${err.message}`);
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  'This pull request has been automatically converted to a draft because it has',
                  'been marked as requiring author feedback but has not had any activity for',
                  '**7 days**.',
                  '',
                  'If no further activity occurs within **7 more days**, this PR will be closed',
                  'automatically.',
                  '',
                  'To continue working on this PR, please push your changes or leave a comment.',
                  'The `Needs-Author-Feedback` label will be removed automatically when you do so.',
                ].join('\n'),
              });
            }
