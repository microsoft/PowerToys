PackageName: Greenshot.Greenshot
Name: Greenshot
WindowFilter: "Greenshot.exe"
BackgroundProcess: true
Shortcuts:
  - SectionName: Capture
    Properties:
      - Name: Capture region
        Recommended: true
        Shortcut:
          - Win: false
            Ctrl: false
            Shift: false
            Alt: false
            Keys:
              - <PrtScr>
      - Name: Capture last region
        Recommended: true
        Shortcut:
          - Win: false
            Ctrl: false
            Shift: true
            Alt: false
            Keys:
              - <PrtScr>
      - Name: Capture window
        Recommended: true
        Shortcut:
          - Win: false
            Ctrl: false
            Shift: false
            Alt: true
            Keys:
              - <PrtScr>
      - Name: Capture fullscreen
        Shortcut:
          - Win: false
            Ctrl: true
            Shift: false
            Alt: false
            Keys:
              - <PrtScr>
      - Name: Capture Internet Explorer tab
        Shortcut:
          - Win: false
            Ctrl: true
            Shift: true
            Alt: false
            Keys:
              - <PrtScn>
  - SectionName: While selecting a region
    Properties:
      - Name: Switch between region and window mode
        Shortcut:
          - Win: false
            Ctrl: false
            Shift: false
            Alt: false
            Keys:
