      - Name: Zoom Out
        Shortcut:
        - Win: false
          Ctrl: true
          Shift: false
          Alt: false
          Keys:
            - "-"
      - Name: Actual Size
        Shortcut:
        - Win: false
          Ctrl: true
          Shift: false
          Alt: false
