    Properties:
      - Name: Image properties
        Shortcut:
        - Win: false
          Ctrl: true
          Shift: false
          Alt: false
          Keys:
            - E
      - Name: Resize and skew
        Shortcut:
        - Win: false
          Ctrl: true
          Shift: false
          Alt: false
